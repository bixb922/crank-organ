<script>

let pageHeader = new PageHeader().setTitle( tlt("Afinar nota"), "notelist" );

// Refresh note info every second
async function getNoteInfo() {
	while( true ) {
		await updateNoteInfo( await fetch_json( "/get_organtuner_json" ) ) ;
		await sleep_ms( 5_000 );
	}
}

    
async function updateNoteInfo( notelist ) {
	let note_number = getResourceNumberFromURL() ;
	let note = notelist[note_number] ;
	let program_number = 0; // default:  wildcard
	if( Object.hasOwn( note, "program_number" )){
		program_number = note["program_number"] ;
	}
	let detail = "";
	if( program_number ){
		detail += programNameList[program_number] ;
		detail += " " + noteName(program_number, note["midi_number"]);
	}
	textById( "note_name", note["name"] ) ;
	textById( "detail", detail );
	showHideElement( "detail", detail );

	textById( "frequency", Math.round(note["frequency"]*10)/10 );
    let cents = note["cents"] ;
	let s = "-" ;
    if( cents != null ){
		s = Math.round(cents) ;
    }
	textById( "cents", s ) ;

	let ampdb = note["ampdb"] ;
	s = "-" ;
    if( ampdb != null ) {
	   s += Math.round(ampdb) ;
    }
	textById( "amplitude", ampdb );
	textById( "pin_name", note["pinname"] ) ;
	textById("tuningcaption", tlt("Afinación") + "(-" + MAX_CENTS + tlt(" a ") + MAX_CENTS + " cents)") ;
	
	let tuningBody = document.getElementById( "tuningbody" );
	tuningBody.innerText = "" ;
	centslist = note["centslist"] ;
	for( let j = 0 ; j < centslist.length ; j++ ){
		let row = insertRow( tuningBody, ["", ""]);
		row.cells[0].id = `tuning${j}_text`;
		let centsBar = document.createElement("canvas", {is:"needle-bar"});
		centsBar.id = `tuning${j}`;
		let config = await configCache.get();
		let cents_limit = config["tuning_cents"];
		centsBar.setParam( 80, -MAX_CENTS, MAX_CENTS, cents_limit );
		row.cells[1].appendChild( centsBar );
	}
	
	let amplistdb = note["amplistdb"] ;
	textById("ampcaption", tlt("Amplitud") +  "(" + MIN_DB + tlt(" a ") + MAX_DB +" dB)" );
	let amplitudeBody = document.getElementById( "amplitudebody");
	for( let j = 0 ; j < amplistdb.length ; j++ ){
		let row = insertRow( amplitudeBody, ["", ""]);
		row.cells[0].id = `amp${j}_text`;
		let dbBar = document.createElement("canvas", {is:"needle-bar"});
		dbBar.id = `amp${j}`;
		dbBar.setParam( 80, MIN_DB, MAX_DB, 0 );
		row.cells[1].appendChild( dbBar );
	}	

	for( let j = 0 ; j < centslist.length ; j++  ){
        cents = centslist[j];
        let elename = "tuning" + j ;
        let docele = document.getElementById( elename ) ;
		let doctext = document.getElementById( elename + "_text" );
        if( cents != null && cents != -9999 ){
          docele.style.visibility = "visible" ;
		  let color = fire_brick ;
 		  if( -0.05 <= cents <= 0.05 ){
			  color = midnight_green ;
		  }
		  let centsBar = document.getElementById(elename);
		  centsBar.draw( cents );
		  doctext.innerText = Math.round(cents) ;
        }
        else{
            docele.style.visibility = "hidden" ;
			doctext.innerText = "..." ;
        }
	}
	for( let j = 0 ; j < amplistdb.length ; j++ ){
        let ampdb = amplistdb[j] ;
        let elename = "amp" + j ;
        let docele = document.getElementById( elename ) ;
		let doctext = document.getElementById( elename + "_text" );
        if( ampdb != null ){
            docele.style.visibility = "visible" ;
			let dbBar = document.getElementById(elename);
			dbBar.draw( ampdb );
			doctext.innerText = Math.round( ampdb ) ;
        }
        else{
            docele.style.visibility = "hidden" ;
			doctext.innerText = "..." ;
        }
	}
}



// Functions to start tuning of one note
async function startTuning() {
    await fetch_json( "/start_tuning/" + getResourceNumberFromURL() ) ;
	// getNoteInfo will show progress
}

async function soundNote() {
	 await fetch_json( "/sound_note/" + getResourceNumberFromURL() ) ;
}

async function repeat() {
	let data = getRepeatData();
	data["pinIndex"] =  getResourceNumberFromURL();
	await fetch_json( "/repeat_note", getRepeatData() ) ;
}

// Store and retrieve repetition rate in tab storage
function getRepeatData( ){
	let data = sessionStorage.getItem( "noteRepetition" );
	if( !data || typeof data != "string" || data.substring(0,1) != "{" 	)	{
		// Set repetition default values here
		data = {
			"fixedNoteDuration": 100, 
			"autoNoteDuration": "200/50 120/50 100/50 75/50 50/50 40/50 30/50 30/40 30/30",
			"playDuring": 4, 
			"auto": false } ;
	}
	else{
		data = JSON.parse( data );
	}
	data["pinIndex"] =  getResourceNumberFromURL();
	return data;
}
function storeRepeatData(data){
	sessionStorage.setItem( "noteRepetition", JSON.stringify( data ) );
	showRepeat(data);
}
function showRepeat(data){
	if( data["auto"]){
		textById( "repeat_times", data["autoNoteDuration"]);
	}
	else{
		textById( "repeat_times", ""+data["fixedNoteDuration"] + "/" + data["fixedNoteDuration"] );
	}
}

async function openRepetitionModal(){
	let data = getRepeatData();
	document.getElementById("autoRadio").checked = data["auto"];
	document.getElementById("fixedRadio").checked = !data["auto"];
	document.getElementById("autoNoteDuration").value =  data["autoNoteDuration"];
	document.getElementById("fixedNoteDuration").value = data["fixedNoteDuration"];

	let modal = document.getElementById("modalRepetition");
	modal.style.display = "block";

}

async function saveRepetitionData() {
	if(!validateAutoNoteDuration()){
		return;
	}
	// Save button on modal dialog to get note time has been pressed.
	// Store values in tab storage.
	let data = getRepeatData();
	data["auto"] = document.getElementById("autoRadio").checked;
	data["autoNoteDuration"] = document.getElementById("autoNoteDuration").value;
	data["fixedNoteDuration"] = document.getElementById("fixedNoteDuration").value;
	storeRepeatData( data );
	closeRepetitionModal();
}	

async function closeRepetitionModal(){
    let modal = document.getElementById( "modalRepetition" );
    modal.style.display = "none";
}
function validateAutoNoteDuration(){
	let inputField = document.getElementById("autoNoteDuration");
	let s = inputField.value ;
	inputField.style.backgroundColor = "white";
	let i = -1;
	let elementList = s.split(" ");
	for( let element of elementList){
		i +=1;
		const [note, silence] = element.split("/");
		if( isNaN(note) || isNaN(silence)){
			inputField.style.backgroundColor = "#FFD0C0";
			return false;
		}
	}
	return true;
}

async function stopTuning() {
    await fetch_json( "/stop_tuning" ) ;
}

async function nextNote(){
	// no previous note button, can use back on browser.
	let note_number = getResourceNumberFromURL() + 1;
	parseInt( note_number );
	let notelist = await fetch_json( "/get_organtuner_json" );
	if( note_number >= notelist.length ){
		note_number = 0;
	}
	window.location.href = "/note/" + note_number ;
}
translate_html();
getNoteInfo() ;
showRepeat( getRepeatData() );
commonGetProgress.setSleep( 5_000 );
commonGetProgress.startBackground();

</script>
